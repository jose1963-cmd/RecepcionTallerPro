<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{font-family:Arial,sans-serif;background:#0f1728;margin:0;padding:16px;color:#e8edf7}

@media(max-width:520px){
.row{grid-template-columns:1fr}
}
#estado{
font-weight:bold;
}

#estado option{
font-weight:bold;
}

.estado-citado{
background:#2196f3;
color:white;
}

.estado-entaller{
background:#ff7a1a;
color:white;
}

.estado-finalizado{
background:#28a745;
color:white;
}
</style>
</head>
<body>

<button onclick="showTab('taller')">TALLER</button>

<div id="inicio" class="card hidden">

BIENVENIDO
</h1>

<h2 style="text-align:center;">
TALLERES AUTOBORJA
</h2>

<p style="text-align:center;margin-top:40px;">
Gestión de órdenes de trabajo
</p>

<button class="green"
onclick="showTab('nueva')"
style="width:100%;font-size:24px;padding:20px;margin-top:40px;">
NUEVA OT
</button>

<button class="secondary" onclick="exportarCopia()" type="button">
EXPORTAR COPIA
</button>

<label>Matrícula *</label>
<input id="matricula" placeholder="0000ABC">
<button onclick="buscarMatricula()" type="button">BUSCAR MATRÍCULA</button>

<label>Importar clientes/vehículos desde CSV</label>

IMPORTAR CSV
</button>

<div class="row">
<div>

</div>
<div>

</div>
</div>

<option>CITADO</option>

GUARDAR OT

<div id="taller" class="card hidden">

<script>

const STORAGE="RECEPCION_TALLER_PRO";

let ots=[];
let contadores={agenda:0,ot:0,factura:0};

try{
const guardado=JSON.parse(localStorage.getItem(STORAGE)||"[]");

if(Array.isArray(guardado)){
ots=guardado;
}else{
ots=Array.isArray(guardado.ots) ? guardado.ots : [];
contadores=guardado.contadores || {agenda:0,ot:0,factura:0};
}
}catch(e){
ots=[];
contadores={agenda:0,ot:0,factura:0};
}

let editandoId=null;

const MARCAS=[
"SEAT","VOLKSWAGEN","AUDI","SKODA","BMW","MERCEDES",
"PEUGEOT","RENAULT","CITROEN","OPEL","FORD","TOYOTA",
"NISSAN","KIA","HYUNDAI","DACIA","FIAT","MAZDA"

];const MODELOS={

"ALFA ROMEO":["147","156","159","GIULIA","GIULIETTA","MITO","STELVIO","TONALE"],
"AUDI":["A1","A3","A4","A5","A6","A7","A8","Q2","Q3","Q5","Q7","Q8","TT"],

"SEAT":["ALHAMBRA","ALTEA","ARONA","ATECA","CORDOBA","EXEO","IBIZA","LEON","TARRACO","TOLEDO"],
"SKODA":["FABIA","KAMIQ","KAROQ","KODIAQ","OCTAVIA","RAPID","SCALA","SUPERB","YETI"],
"SMART":["FORTWO","FORFOUR"],
"SUBARU":["FORESTER","IMPREZA","LEGACY","OUTBACK","XV"],

"TOYOTA":["AURIS","AVENSIS","AYGO","C-HR","COROLLA","HILUX","LAND CRUISER","PRIUS","PROACE","RAV4","VERSO","YARIS","YARIS CROSS"],
"VOLKSWAGEN":["AMAROK","BEETLE","CADDY","CRAFTER","GOLF","PASSAT","POLO","T-CROSS","T-ROC","TIGUAN","TOUAREG","TOURAN","TRANSPORTER"],

function formatearFecha(fecha){

if(!fecha) return "SIN CITA";

const d=new Date(fecha);

const dia=String(d.getDate()).padStart(2,"0");
const mes=String(d.getMonth()+1).padStart(2,"0");
const año=d.getFullYear();

const hora=d.getHours();
const min=String(d.getMinutes()).padStart(2,"0");

return `${dia}/${mes}/${año} - ${hora}:${min}h`;

}
function guardar(){
localStorage.setItem(STORAGE,JSON.stringify({
ots:ots,
contadores:contadores
}));
}

function siguienteNumero(tipo){
contadores[tipo]=(contadores[tipo]||0)+1;
return contadores[tipo];
}

function formatearNumero(prefijo,numero){
if(!numero) return "SIN Nº";
return prefijo+"-"+String(numero).padStart(4,"0");
}

function referenciaOT(ot){
if(ot.estado==="CITADO") return formatearNumero("A",ot.numeroAgenda);
if(ot.estado==="EN TALLER") return formatearNumero("OT",ot.numeroOT);
if(ot.estado==="FINALIZADO") return formatearNumero("FAC",ot.numeroFactura);
return "SIN Nº";
}

function asegurarNumeracion(ot){
const esFichaCliente=ot.trabajos==="IMPORTADO DESDE CSV" && !ot.fecha;
if(esFichaCliente) return;

if(ot.estado==="CITADO" && !ot.numeroAgenda){
ot.numeroAgenda=siguienteNumero("agenda");
}

if(ot.estado==="EN TALLER" && !ot.numeroOT){
ot.numeroOT=siguienteNumero("ot");
}

if(ot.estado==="FINALIZADO" && !ot.numeroFactura){
ot.numeroFactura=siguienteNumero("factura");
}
}

function completarNumeracionExistente(){
ots
.slice()
.sort((a,b)=>(a.id||0)-(b.id||0))
.forEach(ot=>asegurarNumeracion(ot));
}

function resetearPrograma(){
const texto=prompt("Esto borra todos los datos de prueba y reinicia A, OT y FAC desde 0001. Para confirmar escribe BORRAR");

if(texto!=="BORRAR"){
alert("OPERACIÓN CANCELADA");
return;
}

ots=[];
contadores={agenda:0,ot:0,factura:0};
editandoId=null;
guardar();
alert("PROGRAMA REINICIADO. LA PRÓXIMA OT EMPEZARÁ EN 0001");
showTab('inicio');
}

function exportarCopia(){
const copia={
version:2,
fechaCopia:new Date().toISOString(),
ots:ots,
contadores:contadores
};

const datos=JSON.stringify(copia,null,2);
const blob=new Blob([datos],{type:"application/json"});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="copia_autoborja_ot.json";
document.body.appendChild(a);
a.click();
document.body.removeChild(a);

URL.revokeObjectURL(url);
}

function importarCopia(event){
const file=event.target.files[0];
if(!file)return;

const reader=new FileReader();

reader.onload=function(e){
try{
const datos=JSON.parse(e.target.result);

if(Array.isArray(datos)){
ots=datos;
contadores={agenda:0,ot:0,factura:0};
completarNumeracionExistente();
}else if(datos && Array.isArray(datos.ots)){
ots=datos.ots;
contadores=datos.contadores || {agenda:0,ot:0,factura:0};
completarNumeracionExistente();
}else{
alert("COPIA NO VÁLIDA");
event.target.value="";
return;
}

guardar();
alert("COPIA IMPORTADA CORRECTAMENTE");
showTab('inicio');

}catch(error){
alert("ERROR AL IMPORTAR COPIA");
}

event.target.value="";
};

reader.readAsText(file,"UTF-8");
}


function irGuardar(){
setTimeout(()=>{
document.getElementById("btnGuardar").scrollIntoView({
behavior:"smooth",
block:"center"
});
},150);
}

function showTab(id){

document.getElementById("inicio").classList.add("hidden");
document.getElementById("nueva").classList.add("hidden");
document.getElementById("historial").classList.add("hidden");
document.getElementById("agenda").classList.add("hidden");
document.getElementById("taller").classList.add("hidden");

document.getElementById(id).classList.remove("hidden");

const titulo=document.getElementById("tituloApp");

document.getElementById("tabs").style.display =
id==="inicio" ? "none" : "flex";

document.querySelectorAll("#tabs button").forEach(btn=>{
btn.classList.remove("activo");
});

if(id==="inicio"){
titulo.style.background="#0f1728";
titulo.style.color="#ff7a1a";
}

if(id==="nueva"){
document.querySelectorAll("#tabs button")[0].classList.add("activo");
titulo.style.background="#ff7a1a";
titulo.style.color="#0f1728";
}

if(id==="agenda"){
document.querySelectorAll("#tabs button")[1].classList.add("activo");
titulo.style.background="#2196f3";
titulo.style.color="white";
}

if(id==="taller"){
document.querySelectorAll("#tabs button")[2].classList.add("activo");
titulo.style.background="#9c27b0";
titulo.style.color="white";
}

if(id==="historial"){
document.querySelectorAll("#tabs button")[3].classList.add("activo");
titulo.style.background="#28a745";
titulo.style.color="white";
}

if(id==="historial") renderHistorial();
if(id==="agenda") renderAgenda();
if(id==="taller") renderTaller();
}
function normalizar(t){
return (t || "").toUpperCase();
}
function mostrarMarcas(){
const texto=normalizar(document.getElementById("marca").value);
const box=document.getElementById("marcaResultados");
box.innerHTML="";

MARCAS
.filter(m=>m.includes(texto))
.forEach(m=>{
box.innerHTML+=`
<button type="button" onclick="elegirMarca('${m}')">${m}</button>
`;
});
}

function elegirMarca(marca){
document.getElementById("marca").value=marca;
document.getElementById("marcaResultados").innerHTML="";
document.getElementById("modelo").value="";
mostrarModelos();
}

function mostrarModelos(){
const marca=document.getElementById("marca").value.toUpperCase();
const texto=normalizar(document.getElementById("modelo").value);
const box=document.getElementById("modeloResultados");
box.innerHTML="";

const lista=MODELOS[marca]||[];

lista
.filter(m=>m.includes(texto))
.forEach(m=>{
box.innerHTML+=`
<button type="button" onclick="elegirModelo('${m}')">${m}</button>
`;
});
}

function elegirModelo(modelo){
document.getElementById("modelo").value=modelo;
document.getElementById("modeloResultados").innerHTML="";
}
function importarCSV(){

const file=document.getElementById("importFile").files[0];

if(!file){
alert("SELECCIONA UN ARCHIVO CSV");
return;
}

const reader=new FileReader();

reader.onload=function(e){

const texto=e.target.result;
const lineas=texto.split(/\r?\n/).filter(l=>l.trim()!=="");

if(lineas.length<2){
alert("EL CSV ESTÁ VACÍO O NO TIENE DATOS");
return;
}

const cabeceras=lineas[0]
.split(";")
.map(h=>h.trim().toLowerCase());

let importados=0;

for(let i=1;i<lineas.length;i++){

const valores=lineas[i]
.split(";")
.map(v=>v.trim());

const registro={};

cabeceras.forEach((cabecera,index)=>{
registro[cabecera]=valores[index]||"";
});

if(registro.matricula){

const existente=ots.find(x=>
x.matricula===registro.matricula.toUpperCase()
);

const nuevo={
id:Date.now()+i,
matricula:registro.matricula.toUpperCase(),
cliente:(registro.cliente||"").toUpperCase(),
telefono:registro.telefono||"",
marca:(registro.marca||"").toUpperCase(),
modelo:(registro.modelo||"").toUpperCase(),
km:"",
fecha:"",
estado:"CITADO",
trabajos:"IMPORTADO DESDE CSV",
observaciones:""
};

if(existente){
Object.assign(existente,nuevo,{id:existente.id});
}else{
ots.push(nuevo);
}

importados++;
}
}

guardar();

alert("IMPORTACIÓN COMPLETADA: "+importados+" REGISTROS");

};

reader.readAsText(file,"UTF-8");
}
function buscarMatricula(){

const mat=document.getElementById("matricula")
.value.trim().toUpperCase();

if(!mat)return;

const ot=[...ots]
.reverse()
.find(x=>x.matricula===mat);

if(!ot){
document.getElementById("aviso").classList.remove("hidden");
document.getElementById("aviso").innerText=
"MATRÍCULA NO ENCONTRADA";
return;
}

document.getElementById("cliente").value=
ot.cliente||"";

document.getElementById("telefono").value=
ot.telefono||"";

document.getElementById("marca").value=
ot.marca||"";

document.getElementById("modelo").value=
ot.modelo||"";

document.getElementById("aviso").classList.remove("hidden");
document.getElementById("aviso").innerText=
"DATOS RECUPERADOS";
}

function guardarOT(){

const ot={
id:Date.now(),
matricula:document.getElementById("matricula").value.trim().toUpperCase(),
cliente:document.getElementById("cliente").value.trim().toUpperCase(),
telefono:document.getElementById("telefono").value.trim(),
marca:document.getElementById("marca").value.trim().toUpperCase(),
modelo:document.getElementById("modelo").value.trim().toUpperCase(),
km:document.getElementById("km").value.trim(),
fecha:document.getElementById("fecha").value,
estado:document.getElementById("estado").value,
trabajos:document.getElementById("trabajos").value.trim().toUpperCase(),
observaciones:document.getElementById("observaciones").value.trim().toUpperCase()
};

if(!ot.matricula||!ot.cliente||!ot.trabajos){
alert("FALTAN DATOS OBLIGATORIOS");
return;
}
if(editandoId){
  
  const anterior=ots.find(x=>x.id===editandoId) || {};
  ot.id=editandoId;
  ot.numeroAgenda=anterior.numeroAgenda;
  ot.numeroOT=anterior.numeroOT;
  ot.numeroFactura=anterior.numeroFactura;
  asegurarNumeracion(ot);
  ots=ots.map(x=>x.id===editandoId ? ot : x);
  editandoId=null;
  alert("OT ACTUALIZADA: "+referenciaOT(ot));
}else{
  asegurarNumeracion(ot);
  ots.push(ot);
  alert("OT GUARDADA: "+referenciaOT(ot));
}
guardar();


document.getElementById("matricula").value="";
document.getElementById("cliente").value="";
document.getElementById("telefono").value="";
document.getElementById("marca").value="";
document.getElementById("modelo").value="";
document.getElementById("km").value="";
document.getElementById("fecha").value="";
document.getElementById("estado").value="CITADO";
actualizarColorEstado();
document.getElementById("trabajos").value="";
document.getElementById("observaciones").value="";

showTab('inicio');

window.scrollTo({
top:0,
behavior:"smooth"
});
}
function colorEstado(estado){
if(estado==="CITADO") return "#2196f3";
if(estado==="EN TALLER") return "#ff7a1a";
if(estado==="FINALIZADO") return "#28a745";
return "#ff7a1a";
}
function renderHistorial(){

const texto=document.getElementById("buscar")
.value.trim().toUpperCase();

const lista=document.getElementById("lista");
lista.innerHTML="";

const filtradas=ots
.filter(ot=>
ot.estado==="FINALIZADO" &&
(!texto ||
normalizar(ot.matricula).includes(texto) ||
normalizar(ot.cliente).includes(texto) ||
normalizar(ot.telefono).includes(texto) ||
normalizar(ot.marca).includes(texto) ||
normalizar(ot.modelo).includes(texto) ||
normalizar(ot.trabajos).includes(texto) ||
normalizar(ot.observaciones).includes(texto)
))
.sort((a,b)=>{
const fechaA=a.fecha ? new Date(a.fecha).getTime() : a.id;
const fechaB=b.fecha ? new Date(b.fecha).getTime() : b.id;
return fechaB-fechaA;
});

if(filtradas.length===0){
lista.innerHTML="<p>No hay órdenes.</p>";
return;
}

filtradas.forEach(ot=>{
lista.innerHTML+=`
<div class="item" style="border-left-color:${colorEstado(ot.estado)}">
<b>${referenciaOT(ot)}</b><br>
<b>${ot.matricula}</b><br>
${ot.cliente}<br>
${ot.telefono}<br>
${ot.marca} ${ot.modelo}<br>
KM: ${ot.km}<br>
Estado: ${ot.estado}<br>
Fecha: ${formatearFecha(ot.fecha)}<br>
<br>
<b>TRABAJOS:</b><br>
${ot.trabajos || "SIN TRABAJOS"}<br>
<br>
<b>OBSERVACIONES:</b><br>
${ot.observaciones || "SIN OBSERVACIONES"}
<br><br>
<div class="acciones">
<button onclick="editarOT(${ot.id})">EDITAR</button>
<button class="secondary" onclick="imprimir(${ot.id})">IMPRIMIR</button>
<button class="green" onclick="enviarWhatsApp(${ot.id})">WHATSAPP</button>
</div>

function editarOT(id){

const ot=ots.find(x=>x.id===id);

if(!ot)return;

editandoId=id;

document.getElementById("matricula").value=ot.matricula||"";
document.getElementById("cliente").value=ot.cliente||"";
document.getElementById("telefono").value=ot.telefono||"";
document.getElementById("marca").value=ot.marca||"";
document.getElementById("modelo").value=ot.modelo||"";
document.getElementById("km").value=ot.km||"";
document.getElementById("fecha").value=ot.fecha||"";
document.getElementById("estado").value=ot.estado||"";
actualizarColorEstado();
document.getElementById("trabajos").value=ot.trabajos||"";
document.getElementById("observaciones").value=ot.observaciones||"";

showTab('nueva');

"✏️ EDITANDO OT: " + ot.matricula;
}

function limpiarTelefonoWhatsApp(telefono){
let numero=(telefono||"").replace(/\D/g,"");

if(numero.startsWith("00")){
numero=numero.substring(2);
}

if(numero.length===9){
numero="34"+numero;
}

return numero;
}

function textoWhatsApp(ot){
const titulo=ot.estado==="CITADO" ? "Recordatorio de cita" :
ot.estado==="EN TALLER" ? "Orden de trabajo" :
"Trabajo finalizado";

return `TALLERES AUTOBORJA

${titulo}

Número: ${referenciaOT(ot)}
Fecha: ${formatearFecha(ot.fecha)}
Matrícula: ${ot.matricula}
Cliente: ${ot.cliente}
Vehículo: ${ot.marca} ${ot.modelo}

Trabajos:
${ot.trabajos || "SIN TRABAJOS"}

Gracias.`;
}

function enviarWhatsApp(id){
const ot=ots.find(x=>x.id===id);
if(!ot)return;

const numero=limpiarTelefonoWhatsApp(ot.telefono);

if(!numero || numero.length<11){
alert("NO HAY TELÉFONO VÁLIDO PARA WHATSAPP");
return;
}

const mensaje=encodeURIComponent(textoWhatsApp(ot));
const url="https://wa.me/"+numero+"?text="+mensaje;
window.location.href=url;
}

function imprimir(id){

const ot=ots.find(x=>x.id===id);
if(!ot)return;

const anterior=document.getElementById("zonaImpresion");
if(anterior) anterior.remove();

const zona=document.createElement("div");
zona.id="zonaImpresion";
zona.innerHTML=`
<style>
#zonaImpresion{display:none}
@media print{
body{background:white!important;color:black!important}
body > *:not(#zonaImpresion){display:none!important}
#zonaImpresion{display:block!important;font-family:Arial;padding:20px;color:black}
#zonaImpresion h1{text-align:center;color:black;background:white}
.box{border:1px solid #333;padding:10px;margin:10px 0}
}
</style>

<h1>${ot.estado==="CITADO" ? "CITA PENDIENTE" : ot.estado==="FINALIZADO" ? "FACTURA" : "ORDEN DE TRABAJO"}</h1>
<p><b>Número:</b> ${referenciaOT(ot)}</p>

<p><b>Cliente:</b> ${ot.cliente}</p>

<p><b>Vehículo:</b> ${ot.marca} ${ot.modelo}</p>
