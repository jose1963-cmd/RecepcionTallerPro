<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RecepcionTallerPro</title>
<style>
body{font-family:Arial,sans-serif;background:#eef2f5;margin:0;padding:16px;color:#102033}
.card{background:white;padding:18px;border-radius:18px;max-width:700px;margin:0 auto 18px;box-shadow:0 2px 10px #0001}
h1{text-align:center;color:#ff7a1a;background:#0b1638;margin:-16px -16px 16px;padding:22px 10px;font-size:26px}
h2{margin:8px 0 14px}
.tabs{display:flex;gap:8px;max-width:700px;margin:0 auto 14px}
.tabs button{flex:1}
input,textarea,select,button{width:100%;box-sizing:border-box;padding:13px;margin:6px 0 12px;border-radius:12px;border:1px solid #ccc;font-size:16px;text-transform:uppercase}
button{background:#295fdb;color:white;font-weight:bold;border:none}
button.secondary{background:#344d7a}
button.green{background:#28a745}
label{font-weight:bold;color:#295fdb}
.hidden{display:none}
.item{background:#f7f7f7;padding:12px;margin-top:10px;border-radius:12px;border-left:5px solid #295fdb}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.results button{background:#f1f4f8;color:#102033;text-align:left;border-radius:0;margin:0;border-bottom:1px solid #ddd}
.notice{background:#e8f5ee;border-left:5px solid #28a745;padding:10px;border-radius:10px;margin-bottom:12px;font-weight:bold}
</style>
</head>
<body>

<h1>RECEPCIÓN TALLER PRO</h1>

<div class="tabs">
<button onclick="showTab('nueva')">NUEVA OT</button>
<button onclick="showTab('historial')">HISTORIAL</button>
<button onclick="showTab('agenda')">AGENDA</button>
</div>

<div id="nueva" class="card">
<h2>Nueva Orden</h2>

<label>Matrícula *</label>
<input id="matricula" placeholder="0000ABC">
<button onclick="buscarMatricula()" type="button">BUSCAR MATRÍCULA</button>
<div id="aviso" class="notice hidden"></div>

<label>Cliente *</label>
<input id="cliente" placeholder="Nombre y apellidos">

<label>Teléfono</label>
<input id="telefono" placeholder="Teléfono">

<label>Marca</label>
<input id="marca" placeholder="Escribe marca">
<div id="marcaResultados" class="results"></div>

<label>Modelo</label>
<input id="modelo" placeholder="Escribe modelo">
<div id="modeloResultados" class="results"></div>

<div class="row">
<div>
<label>KM</label>
<input id="km" placeholder="KM">
</div>
<div>
<label>Fecha / cita</label>
<input id="fecha" type="datetime-local">
</div>
</div>

<label>Estado</label>
<select id="estado">
<option>PENDIENTE</option>
<option>CITADO</option>
<option>EN TALLER</option>
<option>ESPERANDO PIEZAS</option>
<option>FINALIZADO</option>
<option>ENTREGADO</option>
</select>
<label>Trabajos *</label>
<textarea id="trabajos" rows="5"></textarea>

<label>Observaciones</label>
<textarea id="observaciones" rows="4"></textarea>

<button class="green" onclick="guardarOT()" type="button">
GUARDAR OT
</button>

</div>

<div id="historial" class="card hidden">
<h2>Historial</h2>
<input id="buscar" placeholder="Buscar matrícula o cliente" oninput="renderHistorial()">
<div id="lista"></div>
</div>

<div id="agenda" class="card hidden">
<h2>Agenda</h2>
<div id="agendaLista"></div>
</div>

<script>

const STORAGE="RECEPCION_TALLER_PRO";

let ots=[];

try{
ots=JSON.parse(localStorage.getItem(STORAGE)||"[]");
}catch(e){
ots=[];
}
let editandoId=null;
alert("SCRIPT CARGADO");

const MARCAS=[
"SEAT","VOLKSWAGEN","AUDI","SKODA","BMW","MERCEDES",
"PEUGEOT","RENAULT","CITROEN","OPEL","FORD","TOYOTA",
"NISSAN","KIA","HYUNDAI","DACIA","FIAT","MAZDA"

];const MODELOS={
"ABARTH":["500","595","695"],
"ALFA ROMEO":["147","156","159","GIULIA","GIULIETTA","MITO","STELVIO","TONALE"],
"AUDI":["A1","A3","A4","A5","A6","A7","A8","Q2","Q3","Q5","Q7","Q8","TT"],
"BMW":["SERIE 1","SERIE 2","SERIE 3","SERIE 4","SERIE 5","X1","X3","X5","X6"],
"CITROEN":["C1","C2","C3","C3 AIRCROSS","C4","C4 CACTUS","C5","BERLINGO","JUMPY","JUMPER"],
"CUPRA":["ATECA","BORN","FORMENTOR","LEON"],
"DACIA":["DUSTER","JOGGER","LOGAN","SANDERO","SPRING"],
"FIAT":["500","500L","500X","DOBLO","DUCATO","PANDA","PUNTO","TIPO"],
"FORD":["B-MAX","C-MAX","FIESTA","FOCUS","KUGA","MONDEO","PUMA","RANGER","S-MAX","TOURNEO","TRANSIT"],
"HONDA":["ACCORD","CIVIC","CR-V","HR-V","JAZZ"],
"HYUNDAI":["BAYON","GETZ","I10","I20","I30","IONIQ","KONA","SANTA FE","TUCSON"],
"KIA":["CARENS","CEED","NIRO","PICANTO","RIO","SORENTO","SPORTAGE","STONIC","XCEED"],
"MAZDA":["2","3","5","6","CX-3","CX-30","CX-5","MX-5"],
"MERCEDES":["CLASE A","CLASE B","CLASE C","CLASE E","CLA","GLA","GLB","GLC","GLE","SPRINTER","VITO"],
"MINI":["MINI","CLUBMAN","COUNTRYMAN"],
"MITSUBISHI":["ASX","COLT","ECLIPSE CROSS","L200","MONTERO","OUTLANDER","SPACE STAR"],
"NISSAN":["JUKE","LEAF","MICRA","NAVARA","NOTE","NV200","PULSAR","QASHQAI","X-TRAIL"],
"OPEL":["ADAM","AGILA","ANTARA","ASTRA","COMBO","CORSA","CROSSLAND","GRANDLAND","INSIGNIA","MERIVA","MOKKA","MOVANO","VECTRA","VIVARO","ZAFIRA"],
"PEUGEOT":["106","107","108","206","207","208","2008","307","308","3008","407","508","5008","PARTNER","RIFTER","BOXER","EXPERT"],
"PORSCHE":["911","BOXSTER","CAYENNE","CAYMAN","MACAN","PANAMERA"],
"RENAULT":["ARKANA","CAPTUR","CLIO","KADJAR","KANGOO","LAGUNA","MASTER","MEGANE","SCENIC","TRAFIC","TWINGO","ZOE"],
"SEAT":["ALHAMBRA","ALTEA","ARONA","ATECA","CORDOBA","EXEO","IBIZA","LEON","TARRACO","TOLEDO"],
"SKODA":["FABIA","KAMIQ","KAROQ","KODIAQ","OCTAVIA","RAPID","SCALA","SUPERB","YETI"],
"SMART":["FORTWO","FORFOUR"],
"SUBARU":["FORESTER","IMPREZA","LEGACY","OUTBACK","XV"],
"SUZUKI":["ALTO","BALENO","IGNIS","JIMNY","S-CROSS","SWIFT","VITARA"],
"TESLA":["MODEL 3","MODEL S","MODEL X","MODEL Y"],
"TOYOTA":["AURIS","AVENSIS","AYGO","C-HR","COROLLA","HILUX","LAND CRUISER","PRIUS","PROACE","RAV4","VERSO","YARIS","YARIS CROSS"],
"VOLKSWAGEN":["AMAROK","BEETLE","CADDY","CRAFTER","GOLF","PASSAT","POLO","T-CROSS","T-ROC","TIGUAN","TOUAREG","TOURAN","TRANSPORTER"],
"VOLVO":["C30","S40","S60","S80","V40","V50","V60","V70","XC40","XC60","XC90"]
};

function formatearFecha(fecha){

if(!fecha) return "SIN CITA";

const d=new Date(fecha);

const dia=String(d.getDate()).padStart(2,"0");
const mes=String(d.getMonth()+1).padStart(2,"0");
const año=d.getFullYear();

const hora=d.getHours();
const min=String(d.getMinutes()).padStart(2,"0");

return `${dia}/${mes}/${año} - ${hora}:${min}h`;

}
function guardar(){
localStorage.setItem(STORAGE,JSON.stringify(ots));
}

function showTab(id){
document.getElementById("nueva").classList.add("hidden");
document.getElementById("historial").classList.add("hidden");
document.getElementById("agenda").classList.add("hidden");
document.getElementById(id).classList.remove("hidden");

if(id==="historial") renderHistorial();
if(id==="agenda") renderAgenda();
}
function normalizar(t){
return (t||"").toUpperCase();
}

function mostrarMarcas(){
const texto=normalizar(document.getElementById("marca").value);
const box=document.getElementById("marcaResultados");
box.innerHTML="";

MARCAS
.filter(m=>m.includes(texto))
.forEach(m=>{
box.innerHTML+=`
<button type="button" onclick="elegirMarca('${m}')">${m}</button>
`;
});
}

function elegirMarca(marca){
document.getElementById("marca").value=marca;
document.getElementById("marcaResultados").innerHTML="";
document.getElementById("modelo").value="";
mostrarModelos();
}

function mostrarModelos(){
const marca=document.getElementById("marca").value.toUpperCase();
const texto=normalizar(document.getElementById("modelo").value);
const box=document.getElementById("modeloResultados");
box.innerHTML="";

const lista=MODELOS[marca]||[];

lista
.filter(m=>m.includes(texto))
.forEach(m=>{
box.innerHTML+=`
<button type="button" onclick="elegirModelo('${m}')">${m}</button>
`;
});
}

function elegirModelo(modelo){
document.getElementById("modelo").value=modelo;
document.getElementById("modeloResultados").innerHTML="";
}
function buscarMatricula(){

const mat=document.getElementById("matricula")
.value.trim().toUpperCase();

if(!mat)return;

const ot=[...ots]
.reverse()
.find(x=>x.matricula===mat);

if(!ot){
document.getElementById("aviso").classList.remove("hidden");
document.getElementById("aviso").innerText=
"MATRÍCULA NO ENCONTRADA";
return;
}

document.getElementById("cliente").value=
ot.cliente||"";

document.getElementById("telefono").value=
ot.telefono||"";

document.getElementById("marca").value=
ot.marca||"";

document.getElementById("modelo").value=
ot.modelo||"";

document.getElementById("aviso").classList.remove("hidden");
document.getElementById("aviso").innerText=
"DATOS RECUPERADOS";
}

function guardarOT(){

const ot={
id:Date.now(),
matricula:document.getElementById("matricula").value.trim().toUpperCase(),
cliente:document.getElementById("cliente").value.trim().toUpperCase(),
telefono:document.getElementById("telefono").value.trim(),
marca:document.getElementById("marca").value.trim().toUpperCase(),
modelo:document.getElementById("modelo").value.trim().toUpperCase(),
km:document.getElementById("km").value.trim(),
fecha:document.getElementById("fecha").value,
estado:document.getElementById("estado").value,
trabajos:document.getElementById("trabajos").value.trim().toUpperCase(),
observaciones:document.getElementById("observaciones").value.trim().toUpperCase()
};

if(!ot.matricula||!ot.cliente||!ot.trabajos){
alert("FALTAN DATOS OBLIGATORIOS");
return;
}

if(editandoId){
  ot.id=editandoId;
  ots=ots.map(x=>x.id===editandoId ? ot : x);
  editandoId=null;
  alert("OT ACTUALIZADA");
}else{
  ots.push(ot);
  alert("OT GUARDADA");
}
guardar();


document.getElementById("matricula").value="";
document.getElementById("cliente").value="";
document.getElementById("telefono").value="";
document.getElementById("marca").value="";
document.getElementById("modelo").value="";
document.getElementById("km").value="";
document.getElementById("fecha").value="";
document.getElementById("estado").value="PENDIENTE";
document.getElementById("trabajos").value="";
document.getElementById("observaciones").value="";

showTab("nueva");

window.scrollTo({
top:0,
behavior:"smooth"
});
}
function renderHistorial(){

const texto=document.getElementById("buscar")
.value.trim().toUpperCase();

const lista=document.getElementById("lista");
lista.innerHTML="";

const filtradas=ots
.filter(ot=>
!texto ||
normalizar(ot.matricula).includes(texto) ||
normalizar(ot.cliente).includes(texto) ||
normalizar(ot.telefono).includes(texto) ||
normalizar(ot.marca).includes(texto) ||
normalizar(ot.modelo).includes(texto) ||
normalizar(ot.trabajos).includes(texto) ||
normalizar(ot.observaciones).includes(texto)
)
.sort((a,b)=>b.id-a.id);

if(filtradas.length===0){
lista.innerHTML="<p>No hay órdenes.</p>";
return;
}

filtradas.forEach(ot=>{
lista.innerHTML+=`
<div class="item">
<b>${ot.matricula}</b><br>
${ot.cliente}<br>
${ot.telefono}<br>
${ot.marca} ${ot.modelo}<br>
KM: ${ot.km}<br>
Estado: ${ot.estado}<br>
Fecha: ${formatearFecha(ot.fecha)}<br>
<br>
<b>TRABAJOS:</b><br>
${ot.trabajos || "SIN TRABAJOS"}<br>
<br>
<b>OBSERVACIONES:</b><br>
${ot.observaciones || "SIN OBSERVACIONES"}
<br><br>
<button onclick="editarOT(${ot.id})">
EDITAR
</button>
<button class="secondary" onclick="imprimir(${ot.id})">
IMPRIMIR
</button>
</div>
`;
});
}
function renderAgenda(){
const agenda=document.getElementById("agendaLista");
agenda.innerHTML="";

const conFecha=ots
.filter(ot=>ot.fecha)
.sort((a,b)=>a.fecha.localeCompare(b.fecha));

if(conFecha.length===0){
agenda.innerHTML="<p>No hay citas.</p>";
return;
}

conFecha.forEach(ot=>{
agenda.innerHTML+=`
<div class="item">
<b>${formatearFecha(ot.fecha)}</b><br>
${ot.matricula}<br>
${ot.cliente}<br>
${ot.estado}<br>
<br>
<b>TRABAJOS:</b><br>
${ot.trabajos || "SIN TRABAJOS"}<br>
<br>
<b>OBSERVACIONES:</b><br>
${ot.observaciones || "SIN OBSERVACIONES"}<br><br>
</div>
`;
});
}

function editarOT(id){

const ot=ots.find(x=>x.id===id);

if(!ot)return;

editandoId=id;

document.getElementById("matricula").value=ot.matricula||"";
document.getElementById("cliente").value=ot.cliente||"";
document.getElementById("telefono").value=ot.telefono||"";
document.getElementById("marca").value=ot.marca||"";
document.getElementById("modelo").value=ot.modelo||"";
document.getElementById("km").value=ot.km||"";
document.getElementById("fecha").value=ot.fecha||"";
document.getElementById("estado").value=ot.estado||"";
document.getElementById("trabajos").value=ot.trabajos||"";
document.getElementById("observaciones").value=ot.observaciones||"";

showTab("nueva");

alert("EDITANDO OT");
}
function imprimir(id){

const ot=ots.find(x=>x.id===id);

if(!ot)return;

const w=window.open("","_blank");

w.document.write(`
<html>
<head>
<title>OT ${ot.matricula}</title>
<style>
body{font-family:Arial;padding:20px}
h1{text-align:center}
.box{border:1px solid #333;padding:10px;margin:10px 0}
</style>
</head>
<body>
<h1>ORDEN DE TRABAJO</h1>
<p><b>Matrícula:</b> ${ot.matricula}</p>
<p><b>Cliente:</b> ${ot.cliente}</p>
<p><b>Teléfono:</b> ${ot.telefono}</p>
<p><b>Vehículo:</b> ${ot.marca} ${ot.modelo}</p>
<p><b>KM:</b> ${ot.km}</p>
<p><b>Fecha:</b> ${ot.fecha}</p>
<p><b>Estado:</b> ${ot.estado}</p>
<h3>Trabajos</h3>
<div class="box">${ot.trabajos}</div>
<h3>Observaciones</h3>
<div class="box">${ot.observaciones}</div>
<p>Firma cliente: __________________________</p>
<script>window.print();window.close();<\/script>
</body>
</html>
`);

w.document.close();
}

function inicializarPrueba(){

if(ots.length>0)return;

ots.push({
id:Date.now(),
matricula:"0000ASD",
cliente:"JOSE AGOIZ DUARTE",
telefono:"600000000",
marca:"OPEL",
modelo:"ZAFIRA",
km:"350000",
fecha:"",
estado:"PENDIENTE",
trabajos:"PRUEBA INICIAL",
observaciones:"REGISTRO DE PRUEBA"
});

guardar();
}
document.getElementById("marca").addEventListener("input",mostrarMarcas);
document.getElementById("marca").addEventListener("focus",mostrarMarcas);
document.getElementById("modelo").addEventListener("input",mostrarModelos);
document.getElementById("modelo").addEventListener("focus",mostrarModelos);
inicializarPrueba();

</script>
</body>
</html>
